<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Converter</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0a0a">

<style>
body {
  background: #0a0a0a;
  color: #d8c7a3;
  font-family: 'Montserrat', sans-serif;
  margin: 0;
  padding: 20px;
}

.container { max-width: 1100px; margin: auto; }

.card {
  background: #111;
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 20px;
}

.file-label {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: #1a1a1a;
  border: 1px solid #d8c7a3;
  border-radius: 12px;
  padding: 10px;
  cursor: pointer;
}

.file-label input { display: none; }

.file-btn {
  background: #d8c7a3;
  color: #000;
  padding: 8px 12px;
  border-radius: 8px;
  font-weight: bold;
}

.file-name {
  margin-left: 10px;
  opacity: 0.8;
  font-size: 14px;
}

input, select {
  background: #1a1a1a;
  color: #d8c7a3;
  border: 1px solid #d8c7a3;
  border-radius: 10px;
  padding: 10px;
  margin: 5px 0;
  outline: none;
}

.input-group {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin: 15px 0;
}

.input-item {
  display: flex;
  align-items: center;
  gap: 10px;
}

.input-item label {
  min-width: 60px;
}

button {
  padding: 12px 20px;
  border-radius: 12px;
  border: none;
  background: #d8c7a3;
  color: #000;
  cursor: pointer;
  margin-right: 10px;
  margin-top: 10px;
  font-weight: bold;
  transition: opacity 0.2s;
}

button:hover {
  opacity: 0.9;
}

.preview {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 20px;
}

.preview img {
  width: 100%;
  border-radius: 12px;
  border: 1px solid #333;
}

.drop-zone {
  border: 2px dashed #d8c7a3;
  padding: 30px;
  text-align: center;
  border-radius: 12px;
  margin: 15px 0;
  transition: 0.2s;
  color: #d8c7a3;
}

#downloads a {
  color: #d8c7a3;
  text-decoration: none;
  display: block;
  padding: 5px 0;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="container">
  <h1>Converter PRO</h1>

  <div class="card">
    <label class="file-label">
      <input type="file" id="files" multiple accept="image/*">
      <span class="file-btn">Choose files</span>
      <span class="file-name" id="fileText">No file selected</span>
    </label>

    <div class="drop-zone" id="dropZone">
      Drop images here or tap above
    </div>

    <select id="format">
      <option value="image/png">PNG</option>
      <option value="image/jpeg">JPG</option>
      <option value="image/webp">WEBP</option>
    </select>

    <div class="input-group">
      <div class="input-item">
        <label for="width">Width:</label>
        <input type="number" id="width" placeholder="auto">
      </div>
      <div class="input-item">
        <label for="height">Height:</label>
        <input type="number" id="height" placeholder="auto">
      </div>
    </div>

    <button onclick="convertAll()">Convert</button>
    <button onclick="downloadZip()">Download ZIP</button>
  </div>

  <div class="card">
    <h3>Preview</h3>
    <div id="preview"></div>
  </div>

  <div class="card">
    <h3>Individual Downloads</h3>
    <div id="downloads"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>
let convertedFiles = [];

const fileInput = document.getElementById('files');
const fileText = document.getElementById('fileText');
const dropZone = document.getElementById('dropZone');

fileInput.onchange = () => {
  const count = fileInput.files.length;
  fileText.innerText = count === 0 ? "No file selected" : 
                       count === 1 ? "1 file selected" : `${count} files selected`;
};

dropZone.ondragover = e => {
  e.preventDefault();
  dropZone.style.background = "#1a1a1a";
};

dropZone.ondragleave = () => {
  dropZone.style.background = "";
};

dropZone.ondrop = e => {
  e.preventDefault();
  fileInput.files = e.dataTransfer.files;
  fileInput.onchange();
  dropZone.style.background = "";
};

async function convertAll() {
  const files = fileInput.files;
  if (files.length === 0) return alert("Select images first");

  const format = document.getElementById('format').value;
  const wInput = parseInt(document.getElementById('width').value);
  const hInput = parseInt(document.getElementById('height').value);
  const extension = format.split('/')[1].replace('jpeg', 'jpg');

  const preview = document.getElementById('preview');
  const downloads = document.getElementById('downloads');

  preview.innerHTML = '';
  downloads.innerHTML = '';
  convertedFiles = [];

  for (let i = 0; i < files.length; i++) {
    await new Promise(res => {
      const reader = new FileReader();
      reader.onload = e => {
        const img = new Image();
        img.src = e.target.result;
        img.onload = () => {
          const canvas = document.createElement('canvas');
          const ctx = canvas.getContext('2d');

          let w = wInput;
          let h = hInput;

          if (w && !h) {
            h = img.height * (w / img.width);
          } else if (h && !w) {
            w = img.width * (h / img.height);
          } else if (!w && !h) {
            w = img.width;
            h = img.height;
          }

          canvas.width = w;
          canvas.height = h;
          ctx.drawImage(img, 0, 0, w, h);

          const out = canvas.toDataURL(format, 0.92);
          convertedFiles.push({ data: out, name: `img_${i+1}`, ext: extension });

          const div = document.createElement('div');
          div.className = 'preview';
          div.innerHTML = `<img src="${img.src}"><img src="${out}">`;
          preview.appendChild(div);

          const a = document.createElement('a');
          a.href = out;
          a.download = `img_${i+1}.${extension}`;
          a.innerText = `Download img_${i+1}.${extension}`;
          downloads.appendChild(a);

          res();
        };
      };
      reader.readAsDataURL(files[i]);
    });
  }
}

async function downloadZip() {
  if (convertedFiles.length === 0) return alert("Convert something first");

  const zip = new JSZip();
  convertedFiles.forEach(file => {
    const base64 = file.data.split(',')[1];
    zip.file(`${file.name}.${file.ext}`, base64, { base64: true });
  });

  const blob = await zip.generateAsync({ type: 'blob' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = 'converted_images.zip';
  link.click();
  setTimeout(() => URL.revokeObjectURL(link.href), 100);
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
  </html>
