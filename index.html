<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Converter PRO</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0a0a">

<style>
body {
  background: #0a0a0a;
  color: #d8c7a3;
  font-family: 'Montserrat', sans-serif;
  margin: 0;
  padding: 20px;
}

.container { max-width: 1100px; margin: auto; }

.card {
  background: #111;
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 20px;
}

.file-label {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: #1a1a1a;
  border: 1px solid #d8c7a3;
  border-radius: 12px;
  padding: 10px;
  cursor: pointer;
}

.file-label input { display: none; }

.file-btn {
  background: #d8c7a3;
  color: #000;
  padding: 8px 12px;
  border-radius: 8px;
}

.file-name {
  margin-left: 10px;
  opacity: 0.8;
  font-size: 14px;
}

input, select {
  background: #1a1a1a;
  color: #d8c7a3;
  border: 1px solid #d8c7a3;
  border-radius: 10px;
  padding: 10px;
  margin: 5px 0;
}

button {
  padding: 12px 20px;
  border-radius: 12px;
  border: none;
  background: #d8c7a3;
  color: #000;
  cursor: pointer;
  margin-right: 10px;
}

.preview {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 10px;
}

.preview img {
  width: 100%;
  border-radius: 12px;
}

.drop-zone {
  border: 2px dashed #d8c7a3;
  padding: 20px;
  text-align: center;
  border-radius: 12px;
  margin-top: 10px;
  transition: 0.2s;
}

.slider-container {
  display: flex;
  align-items: center;
  gap: 10px;
}

input[type="range"] { width: 100%; }
</style>
</head>

<body>

<div class="container">
  <h1>Converter PRO</h1>

  <div class="card">

    <label class="file-label">
      <input type="file" id="files" multiple accept="image/*">
      <span class="file-btn">Choose files</span>
      <span class="file-name" id="fileText">No file selected</span>
    </label>

    <div class="drop-zone" id="dropZone">
      Drop images here or tap above 👀
    </div>

    <select id="format">
      <option value="image/png">PNG</option>
      <option value="image/jpeg">JPG</option>
      <option value="image/webp">WEBP</option>
    </select>

    <div class="slider-container">
      Quality: <span id="qVal">1</span>
    </div>
    <input type="range" id="quality" min="0.1" max="1" step="0.1" value="1">

    <br>

    Width: <input type="number" id="width" placeholder="auto">
    Height: <input type="number" id="height" placeholder="auto">

    <br><br>

    <button onclick="convertAll()">Convert</button>
    <button onclick="downloadZip()">Download ZIP</button>

  </div>

  <div class="card">
    <h3>Preview</h3>
    <div id="preview"></div>
  </div>

  <div class="card">
    <h3>Downloads</h3>
    <div id="downloads"></div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>
let convertedFiles = [];

// QUALITY
const q = document.getElementById('quality');
const qVal = document.getElementById('qVal');
q.oninput = () => qVal.innerText = q.value;

// FILE INPUT TEXT
const fileInput = document.getElementById('files');
const fileText = document.getElementById('fileText');

fileInput.onchange = () => {
  const count = fileInput.files.length;

  if (count === 0) fileText.innerText = "No file selected";
  else if (count === 1) fileText.innerText = "1 file selected";
  else fileText.innerText = `${count} files selected`;
};

// DRAG & DROP
const dropZone = document.getElementById('dropZone');

dropZone.ondragover = e => {
  e.preventDefault();
  dropZone.style.background = "#222";
};

dropZone.ondragleave = () => {
  dropZone.style.background = "";
};

dropZone.ondrop = e => {
  e.preventDefault();
  fileInput.files = e.dataTransfer.files;
  fileInput.onchange();
  dropZone.style.background = "";
};

// CONVERT
async function convertAll() {
  const files = fileInput.files;
  if (files.length === 0) return alert("Select images first 😅");

  const format = document.getElementById('format').value;
  const quality = parseFloat(q.value);
  const wInput = document.getElementById('width').value;
  const hInput = document.getElementById('height').value;

  const preview = document.getElementById('preview');
  const downloads = document.getElementById('downloads');

  preview.innerHTML = '';
  downloads.innerHTML = '';
  convertedFiles = [];

  for (let i = 0; i < files.length; i++) {
    const reader = new FileReader();

    await new Promise(res => {
      reader.onload = e => {
        const img = new Image();
        img.src = e.target.result;

        img.onload = () => {
          const canvas = document.createElement('canvas');
          const ctx = canvas.getContext('2d');

          let w = wInput || img.width;
          let h = hInput || img.height;

          canvas.width = w;
          canvas.height = h;

          ctx.drawImage(img, 0, 0, w, h);

          const out = canvas.toDataURL(format, quality);

          convertedFiles.push({ data: out, name: `img_${i}` });

          const div = document.createElement('div');
          div.className = 'preview';
          div.innerHTML = `<img src="${img.src}"><img src="${out}">`;
          preview.appendChild(div);

          const a = document.createElement('a');
          a.href = out;
          a.download = `img_${i}`;
          a.innerText = `Download ${i+1}`;
          a.style.display = 'block';
          downloads.appendChild(a);

          res();
        };
      };

      reader.readAsDataURL(files[i]);
    });
  }
}

// ZIP
async function downloadZip() {
  if (convertedFiles.length === 0) {
    alert("Convert something first 😅");
    return;
  }

  const zip = new JSZip();

  convertedFiles.forEach(file => {
    const base64 = file.data.split(',')[1];
    zip.file(file.name + '.png', base64, { base64: true });
  });

  const blob = await zip.generateAsync({ type: 'blob' });

  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = 'images.zip';
  link.click();
}

// SERVICE WORKER
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
  </html>
